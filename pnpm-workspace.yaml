packages:
  - "apps/*"
  - "packages/*"
  - "server"
allowBuilds:
  '@prisma/client': false
  '@prisma/engines': false
  esbuild: false
  prisma: false
  unrs-resolver: set this to true or false
overrides:
  brace-expansion@>=5.0.0 <5.0.6: '>=5.0.6'
  esbuild@>=0.17.0 <0.28.1: '>=0.28.1'
  esbuild@>=0.27.3 <0.28.1: '>=0.28.1'
  hono@<4.12.21: '>=4.12.21'
  ws@>=8.0.0 <8.20.1: '>=8.20.1'
